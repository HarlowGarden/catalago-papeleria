<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Papelería y Abarrotes "El Lápiz" - Catálogo</title>
    <link rel="stylesheet" href="estilo.css" />
</head>
<body>

    <!-- ENCABEZADO -->
    <header>
        <div class="logo">
            <h1>📒 Papelería "La Esquinita"</h1>
            <p>La tienda de confianza</p>
        </div>
    </header>

    <!-- BARRA DE BÚSQUEDA Y FILTROS -->
    <section class="filtros">
        <input type="text" id="buscador" placeholder="🔍 Buscar producto..." />

        <select id="categoria">
            <option value="todas">📋 Todas las categorías</option>
            <option value="papas">🥔 Papas y Botanas</option>
            <option value="dulces">🍫 Dulces y Chocolates</option>
            <option value="bebidas">🥤 Bebidas</option>
            <option value="coca">🥤 Coca y Sabores Grandes</option>
        </select>
    </section>

    <!-- CATÁLOGO DE PRODUCTOS -->
    <main id="catalogo">
       
    </main>

    <script src="script.js"></script>
</body>
</html>
